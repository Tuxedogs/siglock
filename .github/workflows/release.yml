name: Release SigLock

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  release:
    if: github.event_name != 'release'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Validate frontend
        run: npm run check

      - name: Prepare release metadata
        id: release_meta
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $titleVersion = $version -replace '-beta\.', ' Beta '
          "title=SigLock v$titleVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: ${{ steps.release_meta.outputs.title }}
          releaseBody: |
            SigLock v0.1.0 Beta 2 closed beta build.

            Beta 1 users must manually download and install this build because beta.1 did not include in-app update checking.
            Starting with beta.2, update checking is available from Settings after the updater manifest is published and validated.

            Download the Windows setup executable below.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true

      - name: Validate published updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_VERSION: ${{ steps.tauri.outputs.appVersion }}
          RELEASE_TAG: v${{ steps.tauri.outputs.appVersion }}
        run: npm run validate:updater

  validate-updater:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate published updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: npm run validate:updater -- --version=${RELEASE_TAG#v}
